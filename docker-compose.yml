services:
  postgres:
    image: postgres:16-alpine
    container_name: presidential-scoring-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: presidential_scoring
    ports:
      # Bind to loopback only — never expose Postgres on the LAN with default creds.
      - "127.0.0.1:5435:5432"
    volumes:
      - presidential_scoring_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d presidential_scoring"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  presidential_scoring_pgdata:

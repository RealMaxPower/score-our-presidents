reviewer_notes: |
  Nixon is the framework's most demanding dual-axis calibration anchor. Score pattern shows simultaneously
  high good (2.3 = 9/1 China opening, 6.2 = 10/1 EPA, 6.4 = 10/1 ESA, 3.5 = 8/1 tribal self-determination,
  3.4 = 7/1 disability rights, 3.2 = 7/2 Title IX) and high harm (8.1 = 1/10 Watergate, 8.2 = 1/10 admin
  prosecutions, 8.3 = 1/10 norm adherence, 4.2 = 1/9 surveillance, 4.4 = 1/9 transparency, 2.4 = 2/8
  Cambodia, 7.3 = 1/10 honesty). Net is near zero precisely because the framework captures both
  simultaneously rather than collapsing to a midpoint. Lens divergence test: this president should
  produce the largest cross-lens variance of any anchor — Realist may rank him relatively high
  (China + SALT I weighted heavily), Conservative may rank moderate (mixed), Progressive moderate
  (environmental + civil rights vs. Cambodia + civil liberties), Classical Liberal and Libertarian
  should rank very low (institutional integrity + civil liberties failures dominate).

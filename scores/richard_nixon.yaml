        name: "Disability & other protected classes"
        good_score: 7
        harm_score: 1
        low_confidence: false
        notes: "Rehabilitation Act of 1973 — Section 504 prohibited discrimination on basis of disability in federally-funded programs. First federal disability civil rights law. Foundational for ADA (1990)."

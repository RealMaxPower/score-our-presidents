            source_url: "https://www.archives.gov/"
            source_type: primary_document
            tier: 1
            claim: "Nixon's 1970 message formally ended 17-year termination policy and committed federal government to tribal self-determination; restored ~48,000 acres of Blue Lake sacred land to Taos Pueblo, the first major tribal-land restoration."
            direction: good

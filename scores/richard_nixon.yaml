categories:
  - category: 1
    name: "Economic outcomes"
    category_notes: "Stagflation onset. Closed gold window (1971), ending Bretton Woods. Wage-price controls (1971). 1973 oil shock recession. OSHA and EPA brought significant regulatory expansion."
    sub_criteria:
      - id: "1.1"
        name: "Growth & employment"
        good_score: 4
        harm_score: 5
        low_confidence: false
        notes: "1969-70 recession; 1973-75 recession (1973 oil shock). Inflation rising throughout term. Unemployment 3.5% (1969) to 6.6% (mid-1971) and 5.6% (1974)."
        evidence:
          - citation: "BLS unemployment and CPI data 1969-1974; NBER recession dating"
            source_url: "https://www.bls.gov/"
            source_type: statistic
            tier: 1
            claim: "Stagflation onset under Nixon: inflation rose from 5.5% (1969) to 11% (1974) while unemployment also rose, breaking the Phillips Curve relationship that had defined postwar macroeconomic management."
            direction: harm
            verification_status: pending
      - id: "1.2"
        name: "Inequality & mobility"
        good_score: 5
        harm_score: 3
        low_confidence: false
        notes: "Inequality relatively flat. End of Great Compression. Earned Income Tax Credit proposed (later enacted under Ford). SSI replacement of state programs reduced inequality at the bottom."
        evidence:
          - citation: "Piketty & Saez income share data 1969-1974"
            source_url: "canonical"
            source_type: statistic
            tier: 1
            claim: "Top-decile income share remained ~33-34% throughout Nixon years; Great Compression continued holding but ending."
            direction: good
            verification_status: pending
      - id: "1.3"
        name: "Fiscal trajectory"
        good_score: 4
        harm_score: 4
        low_confidence: false
        notes: "Closed gold window August 15, 1971 ending Bretton Woods fixed-exchange-rate system. Deficits returned. Wage-price controls (Aug 1971-Apr 1974) controversial."
        evidence:
          - citation: "Executive Order 11615 (Nixon Shock), August 15, 1971; OMB Historical Tables"
            source_url: "https://www.archives.gov/"
            source_type: primary_document
            tier: 1
            claim: "The Nixon Shock ended the Bretton Woods gold standard, restructuring international monetary system; effects on US fiscal trajectory mixed but the structural change was profound."
            direction: harm
            verification_status: pending
      - id: "1.4"
        name: "Worker conditions & wages"
        good_score: 6
        harm_score: 3
        low_confidence: false
        notes: "OSHA created (1970) — major worker-safety federal expansion. Wage-price controls had mixed labor effects. Real wages flat to declining."
        evidence:
          - citation: "Occupational Safety and Health Act of 1970, Public Law 91-596"
            source_url: "https://www.congress.gov/"
            source_type: primary_document
            tier: 1
            claim: "OSHA Act created federal workplace-safety regulation, the major worker-protection federal expansion of the era; ~50% reduction in workplace fatalities over subsequent decades attributed to OSHA."
            direction: good
            verification_status: pending

  - category: 2
    name: "Foreign policy & war"
    category_notes: "Era E2.3 Cold War. Opening to China and detente with USSR are era-defining good. Cambodia bombing and continued Vietnam War civilian impact are era-10-harm. Paris Peace Accords (1973) ended US Vietnam involvement."
    sub_criteria:
      - id: "2.1"
        name: "War & peace decisions"
        good_score: 5
        harm_score: 6
        low_confidence: false
        era_context: "E2.3 Cold War"
        notes: "Vietnamization (1969 onward). Paris Peace Accords (January 1973) ended US ground combat. BUT: Cambodia secret bombing campaign (1969-1973), Christmas bombing of North Vietnam (December 1972), invasion of Cambodia (1970)."
        evidence:
          - citation: "Paris Peace Accords (January 27, 1973); Operation Menu (Cambodia bombing) declassified records 1969-1970"
            source_url: "canonical"
            source_type: primary_document
            tier: 1
            claim: "Nixon ended US combat involvement in Vietnam via Paris Accords while simultaneously expanding war to Cambodia and Laos in secret bombing campaigns concealed from Congress."
            direction: harm
            verification_status: pending
      - id: "2.2"
        name: "Alliance management"
        good_score: 8
        harm_score: 2
        low_confidence: false
        notes: "Strategic triangulation US-China-USSR transformed Cold War structure. NATO solid. SALT I and ABM Treaty (1972). Detente with USSR. Some tensions with Allies over Nixon Shock."
        evidence:
          - citation: "Anti-Ballistic Missile Treaty (1972); Strategic Arms Limitation Talks Interim Agreement (1972)"
            source_url: "https://history.state.gov/"
            source_type: primary_document
            tier: 1
            claim: "Nixon's strategic triangulation and SALT I represented the largest restructuring of Cold War alliance dynamics since the 1940s; ABM Treaty constrained nuclear arms race until US withdrawal in 2002."
            direction: good
            verification_status: pending
      - id: "2.3"
        name: "Diplomacy & soft power"
        good_score: 9
        harm_score: 1
        low_confidence: false
        notes: "Opening to China (February 1972 Beijing visit) ended 22-year diplomatic freeze. Detente architecture with USSR. Moscow Summit (May 1972). Era-defining diplomatic transformation."
        evidence:
          - citation: "Shanghai Communiqué (February 28, 1972); Nixon-Mao meeting February 21, 1972"
            source_url: "https://history.state.gov/"
            source_type: primary_document
            tier: 1
            claim: "Nixon's 1972 China visit ended 22 years of US-PRC diplomatic separation and reshaped Cold War strategic balance; among the most consequential diplomatic openings in 20th century US foreign policy."
            direction: good
            verification_status: pending
      - id: "2.4"
        name: "Civilian impact"
        good_score: 2
        harm_score: 8
        low_confidence: false
        era_context: "E2.3 — score within era's mass-war norms"
        notes: "Cambodia bombing dropped ~500,000 tons of bombs (1969-1973), destabilizing Cambodia and contributing to conditions for Khmer Rouge ascent. Continued Vietnam civilian casualties. Christmas bombing of Hanoi/Haiphong (December 1972)."
        evidence:
          - citation: "Owen & Kiernan, 'Bombs Over Cambodia' (Walrus 2006); declassified Air Force bombing records"
            source_url: "canonical"
            source_type: academic
            tier: 1
            claim: "US dropped approximately 2.7 million tons of bombs on Cambodia 1965-1973 with the bulk under Nixon; the bombing campaign is widely linked to destabilization that enabled the Khmer Rouge takeover and subsequent genocide."
            direction: harm
            verification_status: pending

  - category: 3

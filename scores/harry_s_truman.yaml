reviewer_notes: |
  Truman is the second of two "early-Cold-War contested" anchors. Score pattern shows simultaneous
  high good (2.2 = 10/1 for NATO+Marshall Plan; 3.1 = 8/2 for EO 9981) and high harm (2.4 = 2/9 for
  atomic bombs + Korean civilian casualties; 3.3 = 0/7 for Lavender Scare; 4.2 = 1/7 for loyalty
  program). This is exactly the dual-axis pattern the framework is designed to capture. Lens divergence
  test: Realist will weight 2.x heavily (lifting Truman); Libertarian will weight 4.x heavily
  (lowering); Progressive will weight 3.1 + 5.3 heavily (mixed). If all three produce different
  rankings of Truman relative to FDR/Eisenhower, the framework is working.

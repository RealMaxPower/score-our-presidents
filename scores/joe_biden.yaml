        name: "Civilian impact"
        good_score: 3
        harm_score: 7
        notes: "During US-supported Israeli operations in Gaza following the October 7, 2023 attacks, the Gaza Health Ministry reported approximately 45,000+ Palestinian deaths through late 2024; the US continued to supply weapons to Israel throughout this period. UN OHCHR reporting documented civilian deaths in Ukraine resulting from Russian targeting during US-supported defensive operations. The August 2021 Afghanistan withdrawal was widely characterized in reporting as chaotic and produced a deadly attack at Kabul airport. The drone program was reduced from Trump T1 levels but continued."
        evidence:
          - citation: "Gaza Health Ministry casualty figures as relayed by UN OCHA (https://www.ochaopt.org/data/casualties) and reported by PBS NewsHour (Dec 2024); UN OHCHR reporting on Ukraine; State Department / DoD arms-transfer notifications"
            source_url: "https://www.pbs.org/newshour/world/gaza-death-toll-tops-45000-from-israel-hamas-war-health-officials-say"
            source_type: statistic
            tier: 1
            claim: "During US-supported Israeli operations in Gaza following the Oct 7 2023 attacks, the Gaza Health Ministry reported the death toll passing 45,000 Palestinians by mid-December 2024 (figures relayed but not independently verified by UN OCHA, which does not distinguish combatants from civilians); the US continued to supply weapons to Israel throughout this period. UN OHCHR documented civilian deaths in Ukraine during the US-supported defensive period."
            direction: harm
            verification_status: verified

  - category: 3

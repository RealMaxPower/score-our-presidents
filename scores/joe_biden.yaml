president: joe_biden
display_name: "Joe Biden"
term_start: 2021-01-20
term_end: 2025-01-20
party: D
terms_served: 1
calibration_anchor: false
spec_version: v1.2
recency_note: "Out of office ~1.3 years per scoring date 2026-05-11. Per v1.2 §9.4: ≤5 years post-term → Cat 10 dropped from weighted total; insufficient_time_elapsed flag set. Other 12 categories proportionally reweighted per lens vectors."

categories:
  - category: 1
    name: "Economic outcomes"
    category_notes: "Inherited COVID-19 crisis and ~6.7% unemployment. Recovery rapid initially. Inflation surged 2021-2022 (peaked 9.1% June 2022). Cooled by 2024. Strong job creation overall."
    sub_criteria:
      - id: "1.1"
        name: "Growth & employment"
        good_score: 7
        harm_score: 3
        notes: "Unemployment fell from 6.7% (Jan 2021) to 4.1% (Jan 2025). ~16 million jobs added — strongest 4-year job creation since Carter. Real GDP grew ~2.5%/year average."
        evidence:
          - citation: "BLS unemployment and BEA real GDP data 2021-2025"
            source_url: "https://www.bls.gov/"
            source_type: statistic
            tier: 1
            claim: "Biden term saw approximately 16 million net new jobs (largest 4-year addition since Carter); unemployment reached 50-year low (3.4% January 2023); growth steady ~2.5%/year."
            direction: good
            verification_status: pending
      - id: "1.2"
        name: "Inequality & mobility"
        good_score: 5
        harm_score: 4
        notes: "ARP 2021 child tax credit expansion temporarily halved child poverty. Expansion expired late 2021 — child poverty doubled. Real wage growth at bottom strong; top-1% share continued rising overall."
        evidence:
          - citation: "American Rescue Plan Act of 2021, Public Law 117-2; Census child poverty data"
            source_url: "https://www.congress.gov/"
            source_type: primary_document
            tier: 1
            claim: "ARP expanded Child Tax Credit to $3,000-3,600 with monthly payments, halving child poverty 2021; expiration end-2021 doubled child poverty back; bottom-quartile real-wage growth strong but inequality trajectory continued."
            direction: good
            verification_status: pending
      - id: "1.3"
        name: "Fiscal trajectory"
        good_score: 3
        harm_score: 6
        notes: "ARP $1.9T + Infrastructure $1.2T + CHIPS $280B + IRA $370B major spending. Federal debt rose from $27.8T to $36T. Annual deficit ~5-7% of GDP. Continued fiscal expansion."
        evidence:
          - citation: "OMB Historical Tables; major Biden-era spending legislation"
            source_url: "https://www.whitehouse.gov/omb/historical-tables/"
            source_type: statistic
            tier: 1
            claim: "Federal debt rose from $27.8T to ~$36T during Biden term; annual deficits ran ~5-7% of GDP; major spending legislation (ARP, Infrastructure, CHIPS, IRA) totaled ~$3T over multi-year period."
            direction: harm
            verification_status: pending
      - id: "1.4"
        name: "Worker conditions & wages"
        good_score: 7
        harm_score: 3
        notes: "Real wage growth strongest in bottom quartile in decades. NLRB strengthened. Strong union support ('most pro-union president'). Walked UAW picket line (Sept 2023) — first sitting president to do so."
        evidence:
          - citation: "BLS bottom-quartile real-wage data; Biden UAW picket line September 26, 2023"
            source_url: "https://www.bls.gov/"
            source_type: statistic
            tier: 1
            claim: "Biden era saw strongest bottom-quartile real-wage growth in decades; first sitting president to walk a picket line (UAW September 2023); strengthened federal labor enforcement."
            direction: good
            verification_status: pending


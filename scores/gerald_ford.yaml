          - citation: "Saigon evacuation (Operation Frequent Wind), April 29-30, 1975; Mayaguez incident, May 12-15, 1975"
            source_url: "https://history.state.gov/"
            source_type: primary_document
            tier: 1
            claim: "Ford executed Saigon evacuation ending US Vietnam involvement; Mayaguez rescue operation lost more Americans (41) than hostages saved (39)."

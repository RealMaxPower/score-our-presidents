      - id: "2.1"
        name: "War & peace decisions"
        good_score: 5
        harm_score: 4
        notes: "Saigon evacuation (April 1975) ended Vietnam War. Mayaguez incident (May 1975) — 41 US deaths to free 39 hostages. No new major wars."

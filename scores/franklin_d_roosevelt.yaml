categories:
  - category: 1
    name: "Economic outcomes"
    category_notes: "Inherited a 25% unemployment rate and a collapsing banking system. Recovery was substantial but uneven, with a sharp Recession of 1937-38 followed by WWII mobilization. Score reflects both the initial rescue and the structural transformation of the US labor market and safety net."
    sub_criteria:
      - id: "1.1"
        name: "Growth & employment"
        good_score: 8
        harm_score: 2
        low_confidence: false
        notes: "Unemployment fell from ~25% (1933) to ~14% (1937), spiked back to ~19% in the 1937-38 recession, then fell to <2% by 1944. GDP doubled in real terms 1933-1945."
        evidence:
          - citation: "Historical Statistics of the United States (Series Ba470, unemployment); BEA historical GDP"
            source_url: "https://www.bls.gov/"
            source_type: statistic
            tier: 1
            claim: "Unemployment fell from ~25% in 1933 to under 2% by 1944, with a notable 1937-38 reversal; real GDP roughly doubled across the period."
            direction: good
            verification_status: pending
      - id: "1.2"
        name: "Inequality & mobility"
        good_score: 9
        harm_score: 1
        low_confidence: false
        notes: "New Deal compressed income inequality substantially. Top marginal tax rates rose to 79% (1936) and 94% (1944). Social Security and Wagner Act enabled mass middle-class formation."
        evidence:
          - citation: "Piketty & Saez, 'Income Inequality in the United States 1913-1998' (QJE 2003); IRS Statistics of Income historical tables"
            source_url: "canonical"
            source_type: academic
            tier: 1
            claim: "The top decile income share fell from ~45% in 1932 to ~33% by 1945; this 'Great Compression' is the largest peacetime inequality reduction in US history."
            direction: good
            verification_status: pending
      - id: "1.3"
        name: "Fiscal trajectory"
        good_score: 4
        harm_score: 5
        low_confidence: false
        era_context: "E2.1 Interwar / E2.2 WWII — wartime spending unavoidable"
        notes: "Federal debt grew from ~$22B (1933) to ~$260B (1945) — from ~40% of GDP to ~120% of GDP. Era-defensible given Depression and war; scored against fiscal-trajectory criterion at face value."
        evidence:
          - citation: "OMB Historical Tables, Table 7.1 Federal Debt"
            source_url: "https://www.whitehouse.gov/omb/historical-tables/"
            source_type: statistic
            tier: 1
            claim: "Federal debt rose from $22.5 billion in 1933 to $258.7 billion in 1945, debt-to-GDP from ~40% to ~120%."
            direction: harm
            verification_status: pending
      - id: "1.4"
        name: "Worker conditions & wages"
        good_score: 9
        harm_score: 1
        low_confidence: false
        notes: "Wagner Act (1935) legalized union organizing; Fair Labor Standards Act (1938) established minimum wage and 40-hour week; union density rose from ~11% (1932) to ~35% (1945)."
        evidence:
          - citation: "Public Law 74-198 (Wagner Act, 1935); Public Law 75-718 (Fair Labor Standards Act, 1938)"
            source_url: "https://www.congress.gov/"
            source_type: primary_document
            tier: 1
            claim: "Two landmark laws structurally reset US labor relations and wage floor, with union density tripling across the FDR years."
            direction: good
            verification_status: pending


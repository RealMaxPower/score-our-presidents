reviewer_notes: |
  FDR is one of three "high good with significant variance" anchors. The combination of transformational
  domestic policy (5.3 = 10/1, 10.1 = 10/1, 10.3 = 10/1, 12.1 = 10/1) with major civil-liberties and
  civil-rights failures (3.1 = 3/8, 4.3 = 2/8, 13.3 = 1/9) makes FDR the framework's most demanding
  calibration test: the dual-axis scoring should show high good AND high harm without collapsing to a
  midpoint. If a lens (e.g., Libertarian on 4.3, or Progressive on 13.3) significantly reweights this
  pattern, the framework is working as designed.

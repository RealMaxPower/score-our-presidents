            source_url: "https://www.archives.gov/"
            source_type: primary_document
            tier: 1
            claim: "Obama banned torture via EO 13491 but extended drone program to target US citizens (al-Awlaki) without judicial process; continued Guantanamo detention."
            direction: good
            verification_status: pending

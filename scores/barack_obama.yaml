  - category: 4
    name: "Civil liberties & rule of law"
    category_notes: "Era E4.4 → E4.5 (Snowden 2013 inflection). Continued and expanded surveillance state. Banned torture. Snowden revelations. Drone program executive precedent."
    sub_criteria:
      - id: "4.1"
        name: "Speech & press posture"
        good_score: 4
        harm_score: 5
        notes: "The Obama Justice Department pursued at least eight Espionage Act prosecutions of alleged leakers (Manning 2010-2013, Drake 2010, Kiriakou 2012, Sterling, Kim, Snowden charged, others) — more than any prior administration on the public record (per Pozen and contemporaneous reporting). The May 2013 AP phone-records subpoena and the contemporaneous Rosen-affidavit episode were characterized in reporting and by press-freedom organizations as the most expansive journalist-records actions of the modern era."
        evidence:
          - citation: "Pozen, 'The Leaky Leviathan: Why the Government Condemns and Condones Unlawful Disclosures of Information', 127 Harv. L. Rev. 512 (2013) (https://harvardlawreview.org/wp-content/uploads/2013/12/vol127_pozen.pdf — documenting that 8 of the ~12 Espionage Act media-leak prosecutions in the statute's then-96-year history occurred under Obama); AP phone-records subpoena May 2013"
            source_url: "https://harvardlawreview.org/wp-content/uploads/2013/12/vol127_pozen.pdf"
            source_type: academic
            tier: 1
            claim: "Per Pozen's Harvard Law Review analysis, the Obama DOJ pursued 8 Espionage Act media-leak prosecutions — more than any prior administration on the public record (out of roughly 12 in the statute's then-96-year history). The May 2013 AP phone-records subpoena was widely characterized by press-freedom organizations as the most expansive journalist-records action of the modern era."
            direction: harm
            verification_status: verified
      - id: "4.2"
        name: "Search, seizure, and surveillance"
        good_score: 3
        harm_score: 6
        era_context: "E4.4 → E4.5 inflection"
        notes: "Continued and expanded Bush-era surveillance. Snowden revelations (June 2013) exposed mass surveillance. USA Freedom Act 2015 ended bulk metadata collection partial reform. Major surveillance state continuation."
        evidence:

        evidence:
          - citation: "US withdrawal from Iraq December 2011; Libya intervention UN authorization Security Council Resolution 1973"
            source_url: "https://history.state.gov/"
            source_type: primary_document
            tier: 1
            claim: "Obama ended formal US combat in Iraq (2011) and reduced Afghanistan forces; Libya intervention contributed to subsequent state collapse; drone program expanded substantially with civilian casualty concerns."

        name: "Transparency & FOIA"
        good_score: 4
        harm_score: 5
        notes: "Held campaign 'most transparent administration' rhetoric but reality more mixed. FOIA processing modestly improved. Espionage Act prosecutions undermined whistleblower transparency."

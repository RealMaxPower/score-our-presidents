president: barack_obama
display_name: "Barack Obama"
term_start: 2009-01-20
term_end: 2017-01-20
party: D
terms_served: 2
calibration_anchor: false
spec_version: v1.2
recency_note: "Out of office ~9.3 years per scoring date 2026-05-11. Per v1.2 §9.4: 5-10 years post-term → Cat 10 sub-criteria tagged low_confidence (tentative_long_tail: true)."

categories:
  - category: 1
    name: "Economic outcomes"
    category_notes: "Inherited Great Recession (worst since Great Depression). Recovery slow but sustained. ARRA stimulus, Dodd-Frank reform. Auto industry rescue. Inequality continued widening."
    sub_criteria:
      - id: "1.1"
        name: "Growth & employment"
        good_score: 7
        harm_score: 3
        notes: "Inherited 7.8% unemployment rising to 10% (Oct 2009); recovery brought to 4.7% (Jan 2017). 11.6 million private-sector jobs added during recovery (longest streak in history)."
        evidence:
          - citation: "BLS unemployment data 2009-2017; BEA GDP data"
            source_url: "https://www.bls.gov/"
            source_type: statistic
            tier: 1
            claim: "Unemployment recovered from 10% (October 2009 peak) to 4.7% (January 2017); 75 consecutive months of private-sector job gains, longest streak in US history."
            direction: good
            verification_status: pending
      - id: "1.2"
        name: "Inequality & mobility"
        good_score: 4
        harm_score: 5
        notes: "Top 1% income share continued rising. Recovery benefited high earners disproportionately initially. Bush tax cuts partially extended; top-rate restoration to 39.6% (2013) modest reversal."
        evidence:
          - citation: "Piketty & Saez income share data 2009-2017; American Taxpayer Relief Act of 2012, Public Law 112-240"
            source_url: "canonical"
            source_type: statistic
            tier: 1
            claim: "Top 1% income share rose from ~17% (2008) to ~22% (2015); ATRA 2012 restored 39.6% top marginal rate; inequality trajectory continued."
            direction: harm
            verification_status: pending
      - id: "1.3"
        name: "Fiscal trajectory"
        good_score: 4
        harm_score: 5
        notes: "ARRA $787B stimulus + Great Recession revenue collapse + bailouts produced record $1.4T (2009) deficit. Annual deficit fell to $585B by 2016. Debt rose from $10.6T to $19.9T."
        evidence:
          - citation: "OMB Historical Tables; American Recovery and Reinvestment Act of 2009, Public Law 111-5"
            source_url: "https://www.whitehouse.gov/omb/historical-tables/"
            source_type: statistic
            tier: 1
            claim: "Federal debt nearly doubled during Obama term ($10.6T to $19.9T) due to ARRA stimulus, Great Recession revenue collapse, and continued Bush tax cuts; annual deficit reduced ~60% from peak."
            direction: harm
            verification_status: pending
      - id: "1.4"
        name: "Worker conditions & wages"
        good_score: 5
        harm_score: 4
        notes: "Real wage growth modest until late-term acceleration. Manufacturing partial recovery via auto bailout. Union density continued declining. Overtime rule expanded (blocked by courts)."
        evidence:
          - citation: "BLS real wages data 2009-2017; Auto Industry Financing and Restructuring Plan 2008-2009"
            source_url: "https://www.bls.gov/"
            source_type: statistic
            tier: 1
            claim: "Auto industry bailout saved estimated 1-1.5 million jobs (GM, Chrysler restructuring); real median household income growth resumed late-term."
            direction: good
            verification_status: pending

  - category: 2
    name: "Foreign policy & war"
    category_notes: "Era E2.4 late Unipolar / E2.5 multipolar onset. Killed bin Laden. Iran nuclear deal. Paris Agreement. Drone program expansion. Libya intervention. Syria red line. Ukraine and Crimea."
    sub_criteria:
      - id: "2.1"
        name: "War & peace decisions"
        good_score: 6
        harm_score: 5
        era_context: "E2.4 → E2.5 transition"

      - id: "8.1"
        name: "Personal ethics & conduct in office"
        good_score: 1
        harm_score: 10
        era_context: "E8 — era-defining 10-harm anchor"
        notes: "On May 30, 2024, a New York jury convicted Trump on 34 counts of falsifying business records (the first felony conviction of a US president); the conviction is on appeal as of the scoring date. Separately, Trump was indicted federally on classified-documents and January 6-related charges and in Georgia on election-interference charges; the two federal cases were subsequently dismissed following the 2024 election, and the Georgia case remains pending in state court. Civil findings include the Carroll defamation verdicts noted at sub-criterion 3.2 and the New York Attorney General's civil fraud judgment. Numerous unadjudicated allegations of sexual misconduct, conflicts arising from continued Trump Organization business activity, and emoluments concerns were the subject of ongoing reporting and litigation."
        evidence:
          - citation: "People v. Trump (N.Y.) — 34-count conviction May 30 2024 (Manhattan DA: https://manhattanda.org/d-a-bragg-announces-34-count-felony-trial-conviction-of-donald-j-trump/); federal classified-documents and Jan 6 indictments 2023 (later dismissed); Fulton County, GA indictment 2023; Carroll civil verdicts 2023-2024"
            source_url: "https://manhattanda.org/d-a-bragg-announces-34-count-felony-trial-conviction-of-donald-j-trump/"
            source_type: primary_document
            tier: 1
            claim: "Trump became the first US president convicted of a felony (People v. Trump, May 30, 2024 — 34 counts of falsifying business records; on appeal). The federal cases on classified documents and January 6 were dismissed following the 2024 election; the Georgia state election-interference case remained pending."
            direction: harm
            verification_status: verified

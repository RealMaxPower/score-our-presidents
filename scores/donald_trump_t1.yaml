        name: "Administration ethics"
        good_score: 2
        harm_score: 9
        notes: "Multiple convictions of Trump associates: Manafort, Cohen, Flynn, Gates, Bannon, Stone, etc. ~5 senior officials convicted of federal crimes. Foreign emoluments lawsuits. Personal-business presidential conflicts."

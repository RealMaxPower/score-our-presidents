            claim: "A federal civil jury found Trump liable for sexual abuse and defamation of E. Jean Carroll (May 9, 2023; $5M verdict — $2M sexual battery, $2.7M defamation, $0.28M punitive); a second jury awarded $83.3M in defamation damages (January 26, 2024); both verdicts were affirmed by the Second Circuit in December 2024. Title IX administrative changes weakened campus sexual-assault procedural protections."

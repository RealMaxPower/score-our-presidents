president: donald_trump_t1
display_name: "Donald Trump (T1)"
term_start: 2017-01-20
term_end: 2021-01-20
party: R
terms_served: 1
calibration_anchor: false
spec_version: v1.2
recency_note: "Out of office ~5.3 years per scoring date 2026-05-11. Per v1.2 §9.4: 5-10 years post-term → Cat 10 sub-criteria tagged low_confidence (tentative_long_tail: true)."
political_sensitivity_note: "Highest political contestation in scoring set. Per brief §4.3 and spec §4.3, scored against documented evidence; per §4.6 multi-attribution applied to Watergate-class events. Both 'Trump was the greatest president' and 'Trump was a fascist' are partisan frames; evidence-based scoring documented below."

categories:
  - category: 1
    name: "Economic outcomes"
    category_notes: "Continued Obama recovery early-term. TCJA 2017 tax cuts. Trade wars with China. COVID-19 economic collapse 2020. Net economic record mixed."
    sub_criteria:
      - id: "1.1"
        name: "Growth & employment"
        good_score: 4
        harm_score: 6
        notes: "Unemployment fell from 4.7% (Jan 2017) to 3.5% (Feb 2020) — continuing Obama trajectory. COVID-19 produced 14.7% unemployment (April 2020) — worst since Great Depression. Net jobs lost over 4 years (~3 million)."
        evidence:
          - citation: "BLS unemployment data 2017-2021; COVID-19 economic impact records"
            source_url: "https://www.bls.gov/"
            source_type: statistic
            tier: 1
            claim: "Trump T1 ended with net job loss of ~3 million across the term — first net job loss since Hoover — driven by COVID-19 pandemic recession; pre-pandemic trajectory continued Obama-era recovery."
            direction: harm
            verification_status: pending
      - id: "1.2"
        name: "Inequality & mobility"
        good_score: 3
        harm_score: 6
        notes: "TCJA 2017 disproportionately benefited high earners and corporations (corporate rate 35%→21%). Top 1% income share continued rising. CARES Act provided broad benefits during COVID."
        evidence:
          - citation: "Tax Cuts and Jobs Act of 2017, Public Law 115-97; CBO TCJA distributional analysis"
            source_url: "https://www.congress.gov/"
            source_type: primary_document
            tier: 1
            claim: "TCJA reduced corporate tax rate from 35% to 21% permanently and reduced individual rates temporarily; CBO estimated top 1% received outsized share of benefits."
            direction: harm
            verification_status: pending
      - id: "1.3"
        name: "Fiscal trajectory"
        good_score: 2
        harm_score: 7
        notes: "TCJA 2017 + COVID-19 spending produced massive deficits. Federal debt rose from $19.9T (Jan 2017) to $27.8T (Jan 2021). Annual deficit reached $3.1T (FY 2020)."
        evidence:
          - citation: "OMB Historical Tables; TCJA Joint Committee on Taxation revenue analysis"
            source_url: "https://www.whitehouse.gov/omb/historical-tables/"
            source_type: statistic
            tier: 1
            claim: "Federal debt rose from $19.9T to $27.8T during Trump T1; TCJA reduced revenues by ~$1.5T over 10 years; COVID-19 spending added trillions more."
            direction: harm
            verification_status: pending
      - id: "1.4"
        name: "Worker conditions & wages"
        good_score: 4
        harm_score: 5
        notes: "Real wage growth modest pre-pandemic. Workforce participation rate flat. Overtime rule weakened. Joint employer rule weakened. Manufacturing employment essentially flat."
        evidence:
          - citation: "BLS real wages data 2017-2021"
            source_url: "https://www.bls.gov/"
            source_type: statistic
            tier: 1
            claim: "Real median household income rose modestly pre-pandemic before pandemic-era collapse; manufacturing employment essentially flat across the term contrary to campaign rhetoric."
            direction: good
            verification_status: pending


calibration_summary:
  good_average_across_categories: 2.5
  harm_average_across_categories: 7.5
  net_average_across_categories: -5.0
  tentative_long_tail: true
  pattern_notes: "Trump T1 is the framework's principal high-harm contemporary anchor. Multiple era-defining 10-harm anchors (4.3 executive restraint, 7.3 honesty, 8.1 personal ethics, 8.3 norm adherence, 9.2 press relationship, 9.3 political violence, 9.4 polarization, 11.1 dignity, 11.2 rhetoric). Goods: Abraham Accords (2.3), SCOTUS appointments (8.4), Operation Warp Speed (5.1 partial), some pre-pandemic economic numbers (1.1). Lens divergence: should be largest of any anchor in absolute terms. Conservative ranks higher than Default (Abraham Accords, SCOTUS, tax cuts weighted heavily); Progressive/Libertarian/Classical Liberal/Internationalist all rank near bottom (civil rights, civil liberties, democratic health, alliance management failures dominant). Populist lens ranks substantially higher than other lenses (delivered economic populism rhetoric, immigration enforcement, anti-elite framing). If lens divergence for Trump T1 is not the largest in absolute terms across the 16 presidents, framework dual-axis design is failing."

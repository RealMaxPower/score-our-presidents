reviewer_notes: |
  Reagan is the "high lens-spread" anchor — the calibration test that requires the framework
  to produce dramatically different rankings under different lenses. The scoring pattern shows
  high good on foreign policy / Cold War endgame (2.2, 2.3 = 8/2) and morale (12.1 = 8/2)
  alongside high harm on HIV/AIDS (3.3 = 0/9), housing/homelessness (5.4 = 1/8), Iran-Contra
  (4.3 = 2/8), Central American civil war support (2.4 = 3/7), administration ethics (8.2 = 2/7),
  and environmental rollback (6.2 = 2/7).

  Expected lens divergence:
  - Conservative: HIGH (heavy weight on Cold War win + restored morale)
  - Realist: HIGH (Cold War endgame + alliance management dominant)
  - Libertarian: MIXED (tax cuts good, but Iran-Contra and surveillance bad)
  - Classical Liberal: LOW-MID (institutional integrity failures dominant)
  - Progressive: LOW (HIV/AIDS catastrophe + inequality + environmental rollback dominant)
  - Communitarian: LOW-MID (housing/homelessness + AIDS catastrophe)
  - Populist: MIXED-HIGH (tax cuts + Reagan Democrats appeal vs. PATCO firing)
  - Internationalist: MIXED (Cold War end good, Central American civil wars bad)

  If lens variance for Reagan is not the largest of any anchor, the framework's dual-axis design
  is not producing the value-pluralism signal that the project's primary insight depends on.

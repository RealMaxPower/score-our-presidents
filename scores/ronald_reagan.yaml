        name: "Growth & employment"
        good_score: 6
        harm_score: 4
        low_confidence: false
        notes: "1981-82 recession: unemployment peaked at 10.8% (December 1982), worst since Great Depression. Recovery 1983-89: 16 million jobs added; unemployment fell to 5.4% (1989). Real GDP grew ~3.5%/year average across expansion years."
        evidence:
          - citation: "BLS unemployment time series 1981-1989; BEA real GDP growth data"
            source_url: "https://www.bls.gov/"
            source_type: statistic
            tier: 1
            claim: "Severe 1981-82 recession (unemployment peak 10.8%) followed by 84-month expansion adding 16 million jobs and reducing unemployment to 5.4% by end of term."

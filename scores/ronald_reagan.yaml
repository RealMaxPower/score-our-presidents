  - category: 1
    name: "Economic outcomes"
    category_notes: "Reaganomics: tax cuts (ERTA 1981, TRA 1986), deregulation, increased defense spending. 1981-82 recession was worst since Great Depression; 1983-89 expansion was strongest postwar. Inequality began rising; debt tripled. Most contested economic legacy of the modern era."

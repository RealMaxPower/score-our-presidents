      - id: "2.1"
        name: "War & peace decisions"
        good_score: 7
        harm_score: 4
        era_context: "E2.3 Cold War"
        notes: "No new wars. Restraint at multiple junctures. Failed Desert One (April 1980) helicopter rescue. Carter Doctrine (1980) committed to Persian Gulf defense."
        evidence:
          - citation: "Operation Eagle Claw (Desert One) April 24, 1980; Carter Doctrine State of the Union January 23, 1980"
            source_url: "https://www.jimmycarterlibrary.gov/"
            source_type: primary_document
            tier: 1
            claim: "Carter maintained foreign-policy restraint despite multiple crises; Desert One rescue mission failed but no escalation to war."

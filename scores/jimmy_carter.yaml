categories:
  - category: 1
    name: "Economic outcomes"
    category_notes: "Era of stagflation, oil shocks, high interest rates. Volcker appointed Fed chairman (August 1979). Recession 1980. Deregulation began (airlines, trucking, banking)."
    sub_criteria:
      - id: "1.1"
        name: "Growth & employment"
        good_score: 4
        harm_score: 6
        notes: "Unemployment fell early-term then rose with 1980 recession. Inflation peaked 13.5% (1980). Misery index reached 21.98 (June 1980)."
        evidence:
          - citation: "BLS unemployment and CPI data 1977-1981"
            source_url: "https://www.bls.gov/"
            source_type: statistic
            tier: 1
            claim: "Stagflation peaked under Carter: inflation 13.5% (1980), unemployment 7.5% (Dec 1980), 'misery index' reached postwar highs."
            direction: harm
            verification_status: pending
      - id: "1.2"
        name: "Inequality & mobility"
        good_score: 5
        harm_score: 3
        notes: "Inequality relatively flat; stagflation hit middle class. EITC expanded modestly."
        evidence:
          - citation: "Piketty & Saez income share data 1977-1981"
            source_url: "canonical"
            source_type: statistic
            tier: 1
            claim: "Income inequality remained near Great Compression lows under Carter despite stagflation pressures."
            direction: good
            verification_status: pending
      - id: "1.3"
        name: "Fiscal trajectory"
        good_score: 4
        harm_score: 4
        notes: "Deficits modest. Inflation eroded debt-to-GDP. Major spending program restraint."
        evidence:
          - citation: "OMB Historical Tables"
            source_url: "https://www.whitehouse.gov/omb/historical-tables/"
            source_type: statistic
            tier: 1
            claim: "Federal deficits remained moderate under Carter; debt-to-GDP held roughly stable at ~33%."
            direction: good
            verification_status: pending
      - id: "1.4"
        name: "Worker conditions & wages"
        good_score: 4
        harm_score: 5
        notes: "Real wages fell substantially due to inflation. Deregulation (airlines, trucking) shifted labor patterns. Minimum wage increased."
        evidence:
          - citation: "BLS real wages data 1977-1981; Airline Deregulation Act of 1978, Public Law 95-504"
            source_url: "https://www.bls.gov/"
            source_type: statistic
            tier: 1
            claim: "Real wages fell ~10% during Carter term due to inflation; deregulation reduced unionized employment in airlines and trucking sectors."
            direction: harm
            verification_status: pending

  - category: 2
    name: "Foreign policy & war"
    category_notes: "Era E2.3 Cold War late. Camp David Accords (1978), Panama Canal Treaties (1977), China normalization (1979), SALT II signing. BUT: Iran Hostage Crisis (1979-1981), Soviet Afghanistan invasion, failed Desert One rescue."

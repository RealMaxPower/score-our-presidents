president: bill_clinton
display_name: "Bill Clinton"
term_start: 1993-01-20
term_end: 2001-01-20
party: D
terms_served: 2
calibration_anchor: false
spec_version: v1.2

categories:
  - category: 1
    name: "Economic outcomes"
    category_notes: "Strongest 8-year economic record of modern presidency. Budget surpluses 1998-2001. Tech boom. Inequality continued rising. Glass-Steagall repeal seeded 2008 crisis."
    sub_criteria:
      - id: "1.1"
        name: "Growth & employment"
        good_score: 9
        harm_score: 1
        notes: "Unemployment fell from 7.3% (Jan 1993) to 4.2% (Jan 2001). Real GDP grew ~4%/year average. ~22 million jobs added. Among strongest 8-year economic records of modern era."
        evidence:
          - citation: "BLS unemployment and BEA real GDP data 1993-2001"
            source_url: "https://www.bls.gov/"
            source_type: statistic
            tier: 1
            claim: "Clinton presided over longest economic expansion in US history to that point; unemployment reached 30-year low (3.8% in April 2000); ~22 million net jobs added."
            direction: good
            verification_status: pending
      - id: "1.2"
        name: "Inequality & mobility"
        good_score: 5
        harm_score: 4
        notes: "Top-decile share continued rising despite strong economy. EITC major expansion (1993). Some mobility improvement during late-1990s boom."
        evidence:
          - citation: "Piketty & Saez income share data 1993-2001; OBRA 1993 EITC expansion"
            source_url: "canonical"
            source_type: statistic
            tier: 1
            claim: "Top 1% income share rose from ~14% (1992) to ~17% (2000) despite strong economy; EITC expansion partially offset inequality at bottom."
            direction: harm
            verification_status: pending
      - id: "1.3"
        name: "Fiscal trajectory"
        good_score: 10
        harm_score: 1
        era_context: "E1 — era-defining 10-good for fiscal trajectory"
        notes: "Four consecutive budget surpluses (FY1998-2001), first since 1969. Debt-to-GDP fell from ~63% (1993) to ~55% (2001). OBRA 1993 + 1990 PAYGO + tech boom + spending restraint."
        evidence:
          - citation: "Omnibus Budget Reconciliation Act of 1993, Public Law 103-66; OMB Historical Tables"
            source_url: "https://www.whitehouse.gov/omb/historical-tables/"
            source_type: primary_document
            tier: 1
            claim: "OBRA 1993 raised top marginal rate to 39.6% and increased gasoline tax, combined with PAYGO discipline and tech-boom revenue produced four consecutive surpluses (FY1998-2001)."
            direction: good
            verification_status: pending
      - id: "1.4"
        name: "Worker conditions & wages"
        good_score: 6
        harm_score: 3
        notes: "Real wages rose substantially during late-1990s tightening labor market. Minimum wage raised 1996. NAFTA labor displacement contested."
        evidence:
          - citation: "BLS real wages data 1993-2001; Minimum Wage Increase Act 1996"
            source_url: "https://www.bls.gov/"
            source_type: statistic
            tier: 1
            claim: "Real median wages rose ~15% during Clinton term, the strongest sustained real-wage growth since 1970s; NAFTA produced manufacturing job displacement that emerged as political issue subsequently."
            direction: good
            verification_status: pending

  - category: 2
    name: "Foreign policy & war"
    category_notes: "Era E2.4 Unipolar moment. Kosovo intervention (1999) without UN authorization. Somalia withdrawal after Mogadishu. Rwanda inaction. Bosnia eventual intervention."
    sub_criteria:
      - id: "2.1"
        name: "War & peace decisions"
        good_score: 6
        harm_score: 5
        era_context: "E2.4 Unipolar"
        notes: "Bosnia intervention (Dayton 1995) ended war. Kosovo air war (1999) without UN authorization. Somalia withdrawal after Mogadishu. Rwanda non-intervention catastrophic."
        evidence:
          - citation: "Dayton Accords November 1995; Kosovo bombing campaign March-June 1999; Rwanda Genocide April-July 1994"
            source_url: "https://history.state.gov/"
            source_type: primary_document
            tier: 1
            claim: "Clinton successfully intervened in Bosnia (Dayton) and Kosovo; failed to intervene in Rwanda Genocide (800,000 deaths) — later called his 'greatest regret.'"
            direction: harm
            verification_status: pending
      - id: "2.2"
        name: "Alliance management"
        good_score: 7
        harm_score: 3
        notes: "NATO expansion (Poland, Hungary, Czech Republic 1999). Russia relations mixed. Asian allies maintained. Kosovo coalition. NAFTA partners."
        evidence:
          - citation: "NATO enlargement 1999 (first post-Cold-War expansion); Partnership for Peace 1994"
            source_url: "https://www.nato.int/"
            source_type: primary_document
            tier: 1
            claim: "Clinton oversaw first post-Cold-War NATO expansion to Poland, Hungary, Czech Republic; established framework for subsequent expansion that Russia later cited as grievance."
            direction: good
            verification_status: pending
      - id: "2.3"
        name: "Diplomacy & soft power"
        good_score: 7
        harm_score: 3
        notes: "Oslo Accords (1993). Good Friday Agreement (1998). Camp David II (2000) failed. NPT extension. Strong soft power era."
        evidence:
          - citation: "Oslo Accords September 13, 1993; Good Friday Agreement April 10, 1998"
            source_url: "https://history.state.gov/"
            source_type: primary_document
            tier: 1
            claim: "Clinton brokered Oslo Accords (Israel-PLO) and Good Friday Agreement (Northern Ireland), two major peace processes; subsequent collapse of Oslo damaged legacy."
            direction: good
            verification_status: pending
      - id: "2.4"
        name: "Civilian impact"
        good_score: 4
        harm_score: 6
        era_context: "E2.4 — Rwanda inaction as principal harm vector"
        notes: "Rwanda Genocide (April-July 1994, ~800,000 deaths) — failure to intervene. Iraq sanctions civilian impact severe. Kosovo war ~500 civilian deaths from NATO bombing."
        evidence:
          - citation: "UN Independent Inquiry on Rwanda (1999); Iraq sanctions impact studies"
            source_url: "https://www.un.org/"
            source_type: primary_document
            tier: 1
            claim: "Clinton later acknowledged Rwanda non-intervention as his greatest foreign-policy regret; Iraq sanctions contributed to estimated 500,000+ Iraqi child deaths over 1990s."
            direction: harm
            verification_status: pending


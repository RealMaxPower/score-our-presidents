        name: "Tribal & indigenous policy"
        good_score: 6
        harm_score: 3
        notes: "Tribal Self-Governance expansion. Government-to-government relationship clarified by EO 13175 (2000). Cobell v. Salazar trust accounting litigation continued."
        evidence:

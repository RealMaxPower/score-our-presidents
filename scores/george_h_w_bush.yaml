categories:
  - category: 1
    name: "Economic outcomes"
    category_notes: "Inherited Reagan-era expansion's end. 1990-91 recession. 1990 budget deal ('read my lips' tax increase) restored fiscal discipline. Slow recovery cost reelection."
    sub_criteria:
      - id: "1.1"
        name: "Growth & employment"
        good_score: 4
        harm_score: 5
        notes: "1990-91 recession. Unemployment rose from 5.4% (Jan 1989) to 7.8% (Jun 1992). Slow recovery cost election."
        evidence:
          - citation: "BLS unemployment data 1989-1993; NBER recession dating July 1990 - March 1991"
            source_url: "https://www.bls.gov/"
            source_type: statistic
            tier: 1
            claim: "Eight-month recession (July 1990-March 1991) followed by slow 'jobless recovery'; unemployment didn't peak until June 1992 election year."
            direction: harm
            verification_status: pending
      - id: "1.2"
        name: "Inequality & mobility"
        good_score: 4
        harm_score: 4
        notes: "Inequality continued rising. 1990 budget deal raised top marginal rate from 28% to 31%. Modest reversal of Reagan inequality trajectory."
        evidence:
          - citation: "Omnibus Budget Reconciliation Act of 1990, Public Law 101-508"
            source_url: "https://www.congress.gov/"
            source_type: primary_document
            tier: 1
            claim: "1990 OBRA raised top marginal rate from 28% to 31% — first reversal of Reagan-era top-bracket cuts; modest impact on inequality trajectory."
            direction: good
            verification_status: pending
      - id: "1.3"
        name: "Fiscal trajectory"
        good_score: 7
        harm_score: 3
        notes: "1990 budget agreement raised taxes and created pay-as-you-go rules. Set up 1990s fiscal consolidation. Politically costly ('read my lips')."
        evidence:
          - citation: "1990 Budget Enforcement Act provisions (PAYGO rules)"
            source_url: "https://www.congress.gov/"
            source_type: primary_document
            tier: 1
            claim: "1990 budget deal created pay-as-you-go rules that helped enable the 1990s deficit reduction and eventual budget surpluses."
            direction: good
            verification_status: pending
      - id: "1.4"
        name: "Worker conditions & wages"
        good_score: 4
        harm_score: 4
        notes: "Real wages stagnant. Union density continued declining. NAFTA negotiated (signed by Clinton)."
        evidence:
          - citation: "NAFTA negotiations 1990-1992"
            source_url: "https://history.state.gov/"
            source_type: historical_record
            tier: 1
            claim: "NAFTA negotiations completed under GHW Bush; framework set for subsequent labor-market dislocation."

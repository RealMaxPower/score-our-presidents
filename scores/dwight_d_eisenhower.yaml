        name: "Speech & press posture"
        good_score: 5
        harm_score: 4
        low_confidence: false
        notes: "Did not publicly oppose McCarthy until Army-McCarthy hearings (1954). Generally allowed press freedom. Smith Act prosecutions continued in early term."
        evidence:

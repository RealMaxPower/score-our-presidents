  - category: 2
    name: "Foreign policy & war"
    category_notes: "Era E2.3 Cold War mid. Notable for restraint: Korean armistice, refusal to intervene at Dien Bien Phu, refusal to back UK/France/Israel at Suez. CIA covert operations (Iran 1953, Guatemala 1954) are the principal harm — major long-tail consequences."

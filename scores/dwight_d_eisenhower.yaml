  - category: 4
    name: "Civil liberties & rule of law"
    category_notes: "Era E4.2 Cold War surveillance. McCarthyism receded under Eisenhower's quiet resistance; he never named McCarthy publicly but undercut him. COINTELPRO began (1956). U-2 cover-up was the major transparency failure."

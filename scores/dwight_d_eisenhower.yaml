      - id: "1.1"
        name: "Growth & employment"
        good_score: 6
        harm_score: 3
        low_confidence: false
        notes: "Real GDP grew ~2.5%/year average. Three recessions but no major downturn. Unemployment averaged ~5%."
        evidence:
          - citation: "BLS and BEA historical data 1953-1961; NBER recession dating"
            source_url: "https://www.bls.gov/"
            source_type: statistic
            tier: 1
            claim: "Eight-year unemployment average ~5%; three recessions (1953-54, 1957-58, 1960-61) but cumulative real GDP growth ~22% across the term."
            direction: good
            verification_status: pending
      - id: "1.2"
        name: "Inequality & mobility"
        good_score: 7
        harm_score: 2
        low_confidence: false
        notes: "Continued Great Compression. Top marginal rate held at 91%. Mass suburbanization enabled middle-class formation."

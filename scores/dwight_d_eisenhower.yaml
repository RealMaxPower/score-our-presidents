      - id: "2.1"
        name: "War & peace decisions"
        good_score: 8
        harm_score: 3
        low_confidence: false
        era_context: "E2.3 Cold War"
        notes: "Korean War armistice (July 1953). Refused to intervene at Dien Bien Phu (1954). Restraint at Suez (1956). U-2 incident handling (1960) poor. Lebanon intervention 1958 limited."
        evidence:
          - citation: "Korean War armistice, July 27, 1953; declassified NSC discussions on Dien Bien Phu intervention (1954)"
            source_url: "canonical"
            source_type: primary_document
            tier: 1
            claim: "Eisenhower ended the Korean War and declined to commit US forces to save the French in Indochina, choosing restraint where his advisors and Vice President urged escalation."

          - citation: "OMB Historical Tables; Treasury debt data 1953-1961"
            source_url: "https://www.whitehouse.gov/omb/historical-tables/"
            source_type: statistic
            tier: 1
            claim: "Eisenhower achieved balanced budgets in three of eight fiscal years and reduced debt-to-GDP ratio by ~15 percentage points."
            direction: good
            verification_status: pending
      - id: "1.4"
        name: "Worker conditions & wages"
        good_score: 7
        harm_score: 2
        low_confidence: false
        notes: "Peak union density (~33%). Real wages grew steadily. Labor-Management Reporting and Disclosure Act (1959) added some union accountability."

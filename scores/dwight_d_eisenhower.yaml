          - citation: "Piketty & Saez income share data 1953-1961; IRS Statistics of Income"
            source_url: "canonical"
            source_type: statistic
            tier: 1
            claim: "Top-decile income share remained at ~33% during the Eisenhower years, near the Great Compression nadir."
            direction: good
            verification_status: pending
      - id: "1.3"
        name: "Fiscal trajectory"
        good_score: 8
        harm_score: 2
        low_confidence: false
        notes: "Balanced budgets in FY1956, 1957, 1960. Debt-to-GDP fell from ~70% to ~55%. Among the strongest fiscal records of the modern era."

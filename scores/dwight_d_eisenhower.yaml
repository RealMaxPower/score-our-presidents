reviewer_notes: |
  Eisenhower is the "low-variance moderate-high" anchor. Scoring pattern shows relatively narrow
  spread (most sub-criteria 5-8 good, 1-4 harm), with the exception of CIA covert-ops (2.4, 10.4),
  Operation Wetback (13.2), LGBTQ employment ban (3.3), and tribal termination (3.5) where harm
  spikes substantially. The contrast with FDR (high variance high) and Truman (high variance mixed)
  tests whether the framework can capture different *patterns* of presidency, not just different
  net scores. Eisenhower should land mid-to-high across most lenses without dramatic divergence,
  in contrast to the high-divergence Reagan anchor.

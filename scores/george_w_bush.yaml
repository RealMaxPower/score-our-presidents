        name: "Civilian impact"
        good_score: 2
        harm_score: 9
        era_context: "E2.4 — Iraq civilian impact major harm"
        notes: "Iraq War civilian deaths: 200,000-1,000,000+ estimates depending on methodology. Afghanistan continued. Detention of thousands without charge. Abu Ghraib torture. Major civilian-impact harm."
        evidence:
          - citation: "Burnham, Lafta, Doocy, Roberts, 'Mortality after the 2003 invasion of Iraq', The Lancet (Oct 2006) estimating 654,965 excess deaths through July 2006; Iraq Body Count documented deaths database"
            source_url: "https://www.thelancet.com/journals/lancet/article/PIIS0140-6736(06)69491-9/fulltext"
            source_type: academic
            tier: 1
            claim: "Estimates of Iraq War civilian and excess deaths span methodologies: The Lancet (Oct 2006) survey-based study estimated 654,965 excess Iraqi deaths through July 2006 (95% CI 393K-943K); Iraq Body Count's media-documented total stood at roughly 150,000 documented civilian deaths by Bush term-end. Subsequent ISIS emergence and sectarian conflict produced additional deaths."
            direction: harm
            verification_status: verified


        name: "War & peace decisions"
        good_score: 2
        harm_score: 9
        era_context: "E2.4 — Iraq War as era-defining 10-harm anchor"
        notes: "Afghanistan War (October 2001) — justified response to 9/11. Iraq War (March 2003) — invasion based on flawed WMD intelligence; ~4,500 US military deaths, ~200K+ Iraqi deaths. Defining foreign-policy failure of 21st century."
        evidence:
          - citation: "Authorization for Use of Military Force Against Iraq Resolution of 2002, Public Law 107-243; Iraq Study Group Report (2006)"
            source_url: "https://www.congress.gov/"
            source_type: primary_document
            tier: 1
            claim: "Iraq invasion was undertaken on premise of WMD that did not exist; war produced ~4,500 US military deaths, ~200,000+ Iraqi deaths, regional destabilization, and rise of ISIS."
            direction: harm
            verification_status: pending
      - id: "2.2"
        name: "Alliance management"
        good_score: 4
        harm_score: 6
        notes: "Strong post-9/11 alliance solidarity. Iraq War fractured NATO consensus (Germany, France opposed). 'Old Europe' rhetoric damaging. UK-US 'special relationship' maintained."
        evidence:

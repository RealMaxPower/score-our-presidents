      - id: "1.1"
        name: "Growth & employment"
        good_score: 3
        harm_score: 7
        notes: "2001 recession (mild). 2007-2009 Great Recession (most severe since Great Depression). Unemployment from 4.2% (Jan 2001) to 7.8% (Jan 2009). Net jobs near zero over 8 years."
        evidence:
          - citation: "BLS unemployment data 2001-2009; NBER recession dating"
            source_url: "https://www.bls.gov/"
            source_type: statistic
            tier: 1
            claim: "GW Bush term spanned two recessions including Great Recession of 2007-2009; net job creation across 8 years was approximately zero — worst since Hoover."
            direction: harm
            verification_status: pending
      - id: "1.2"
        name: "Inequality & mobility"
        good_score: 2
        harm_score: 7
        notes: "Top 1% income share rose from ~17% (2000) to ~19% (2008). Tax cuts disproportionately benefited high earners. Bush tax cuts (2001, 2003) ended 1990s fiscal balance."
        evidence:
          - citation: "Economic Growth and Tax Relief Reconciliation Act of 2001, Public Law 107-16; Jobs and Growth Tax Relief Reconciliation Act of 2003, Public Law 108-27"
            source_url: "https://www.congress.gov/"
            source_type: primary_document
            tier: 1
            claim: "Bush tax cuts substantially reduced top marginal rates and capital gains/dividends taxes; CBO estimated 65% of benefits flowed to top quintile."
            direction: harm
            verification_status: pending
      - id: "1.3"
        name: "Fiscal trajectory"
        good_score: 1
        harm_score: 8
        notes: "Inherited budget surplus (2001) → $1.4T deficit (2009). Federal debt rose from $5.7T to $10.6T. Tax cuts + Iraq War + Medicare Part D + TARP without revenue offsets."
        evidence:
          - citation: "OMB Historical Tables; CBO budget projections 2001-2009"
            source_url: "https://www.whitehouse.gov/omb/historical-tables/"
            source_type: statistic
            tier: 1
            claim: "Federal debt nearly doubled during GW Bush term ($5.7T to $10.6T); inherited surplus converted to $1.4T deficit; debt-to-GDP rose from ~55% to ~74%."
            direction: harm
            verification_status: pending
      - id: "1.4"
        name: "Worker conditions & wages"
        good_score: 3
        harm_score: 6
        notes: "Real wages flat. Union density continued declining. Manufacturing jobs lost. Late-term Great Recession devastated working-class employment."
        evidence:
          - citation: "BLS real wages and manufacturing employment data 2001-2009"
            source_url: "https://www.bls.gov/"
            source_type: statistic
            tier: 1
            claim: "Manufacturing employment fell by approximately 4.5 million during GW Bush term; real median household income fell ~5% from 2001 to 2009."
            direction: harm
            verification_status: pending

  - category: 2
    name: "Foreign policy & war"
    category_notes: "Era E2.4 Unipolar. 9/11 redefined foreign policy. Afghanistan and Iraq wars. Torture program. Guantanamo. PEPFAR positive. Single most consequential foreign-policy presidency since LBJ."
    sub_criteria:
